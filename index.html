<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alertsanya Global Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050505; --gold: #ffd700; --glass: rgba(255, 255, 255, 0.03); --border: rgba(255, 215, 0, 0.15); }
        body { background: var(--bg); color: #fff; font-family: 'Outfit', sans-serif; margin: 0; }
        .app-container { padding: 15px; max-width: 600px; margin: 0 auto; }
        
        /* Premium Header */
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px solid var(--border); }
        .logo h1 { font-size: 22px; margin: 0; color: var(--gold); letter-spacing: 1px; }
        .live-tag { background: rgba(0, 255, 136, 0.1); color: #00ff88; padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: bold; }

        /* Ticker Area */
        .ticker-bar { display: flex; gap: 15px; overflow-x: auto; padding: 15px 0; font-size: 12px; color: var(--gold); }
        .ticker-item { background: var(--glass); padding: 5px 12px; border-radius: 8px; white-space: nowrap; }

        /* Feed Area */
        .feed-title { font-size: 14px; color: #888; margin: 20px 0 10px 0; text-transform: uppercase; letter-spacing: 2px; }
        .feed-item { 
            background: var(--glass); border-left: 3px solid var(--gold); 
            padding: 15px; border-radius: 0 12px 12px 0; margin-bottom: 15px;
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }

        .whale-name { font-weight: bold; font-size: 16px; margin-bottom: 5px; display: block; }
        .action-desc { color: #ccc; font-size: 13px; line-height: 1.4; display: block; margin-top: 5px; }
        .chain-badge { font-size: 10px; background: rgba(255,215,0,0.1); color: var(--gold); padding: 2px 6px; border-radius: 4px; margin-left: 5px; }
        
        .footer { text-align: center; padding: 30px 0; color: #444; font-size: 12px; }
    </style>
</head>
<body>
    <div class="app-container">
        <header>
            <div class="logo"><h1>ALERTSANYA <span style="font-weight: 300; font-size: 12px; color: #666;">GLOBAL</span></h1></div>
            <div class="live-tag">● LIVE INTELLIGENCE</div>
        </header>

        <div class="ticker-bar">
            <div class="ticker-item">BTC: <span id="btc-price">---</span></div>
            <div class="ticker-item">ETH: <span id="eth-price">---</span></div>
            <div class="ticker-item">SOL: <span id="sol-price">---</span></div>
        </div>

        <div class="feed-title">Canlı Balina İstihbaratı</div>
        <div id="main-feed" class="feed-list">
            <div style="text-align: center; padding: 40px; color: #444;">Veriler taranıyor...</div>
        </div>

        <div class="footer">Alertsanya v5.2 Intelligence Network</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://apidenfvezstmpbbxser.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFwaWRlbmZ2ZXpzdG1wYmJ4c2VyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyMTQ0NjQsImV4cCI6MjA5Mjc5MDQ2NH0.MFebJX4cHNxMZCKss2y3YM4FJmegbGKyVP0R8M2qtNM';
        const { createClient } = supabase;
        const _supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        // Fiyat Takibi
        async function fetchPrices() {
            try {
                const symbols = ['BTCUSDT', 'ETHUSDT', 'SOLUSDT'];
                for (let sym of symbols) {
                    const res = await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${sym}`);
                    const data = await res.json();
                    const elId = sym.toLowerCase().replace('usdt', '') + '-price';
                    document.getElementById(elId).innerText = `$${parseFloat(data.price).toLocaleString()}`;
                }
            } catch (e) {}
        }

        // Akış Takibi
        async function fetchFeed() {
            const { data, error } = await _supabase.from('transactions').select('*').order('created_at', { ascending: false }).limit(15);
            if (error) return;
            const list = document.getElementById('main-feed');
            if (data.length > 0) list.innerHTML = '';
            
            data.forEach(tx => {
                list.innerHTML += `
                    <div class="feed-item">
                        <span class="whale-name">${tx.whale_name} <span class="chain-badge">${tx.token_symbol}</span></span>
                        <span class="action-desc">${tx.amount}</span>
                    </div>
                `;
            });
        }

        _supabase.channel('tx').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'transactions' }, fetchFeed).subscribe();
        setInterval(fetchPrices, 10000);
        fetchPrices(); fetchFeed();
    </script>
</body>
</html>
