<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alertsanya Live Terminal</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="terminal-container">
        <!-- Market Ticker -->
        <div class="ticker">
            <div class="ticker-item">BTC: <span id="btc-price">Yükleniyor...</span></div>
            <div class="ticker-item">ETH: <span id="eth-price">Yükleniyor...</span></div>
            <div class="ticker-item">SOL: <span id="sol-price">Yükleniyor...</span></div>
        </div>

        <header>
            <div class="brand">
                <div class="glitch-dot"></div>
                <h1>ALERTSANYA <span class="v-tag">LIVE</span></h1>
            </div>
            <div class="status-indicator">● CANLI VERİ AKIŞI</div>
        </header>

        <!-- Network Selector -->
        <nav class="network-nav">
            <button class="nav-btn active">TÜM AĞLAR</button>
            <button class="nav-btn">SOLANA</button>
            <button class="nav-btn">ETHEREUM</button>
        </nav>

        <!-- Main Feed -->
        <main class="feed-container">
            <div id="main-feed" class="feed-list">
                <!-- Veriler buraya akacak -->
                <div class="loading-state">Balina hareketleri taranıyor...</div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
</body>
</html>
