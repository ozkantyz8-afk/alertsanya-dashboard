<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alertsanya - Professional Alpha Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050505; --gold: #ffd700; --green: #00ff88; --red: #ff3333; --border: rgba(255, 215, 0, 0.1); }
        body { background: var(--bg); color: #fff; font-family: 'Outfit', sans-serif; margin: 0; }
        .app-container { padding: 15px; max-width: 600px; margin: 0 auto; }
        
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px solid var(--border); }
        .logo h1 { font-size: 20px; margin: 0; color: var(--gold); letter-spacing: 2px; }

        .feed-item { 
            background: rgba(255,255,255,0.02); border: 1px solid var(--border); padding: 15px; 
            border-radius: 12px; margin-bottom: 20px;
        }
        
        .whale-header { display: flex; justify-content: space-between; margin-bottom: 10px; border-bottom: 1px solid rgba(255,215,0,0.05); padding-bottom: 8px; }
        .whale-name { color: var(--gold); font-weight: bold; }
        
        .action-box { margin: 15px 0; }
        .desc-txt { font-size: 14px; color: #ccc; line-height: 1.5; }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .action-btn { 
            text-align: center; padding: 10px; border-radius: 6px; text-decoration: none; font-weight: bold; font-size: 12px;
            transition: opacity 0.2s;
        }
        .btn-chart { background: var(--gold); color: #000; }
        .btn-security { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid #444; }
        
        .tag { font-size: 10px; background: rgba(0,255,136,0.1); color: var(--green); padding: 2px 6px; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="app-container">
        <header>
            <div class="logo"><h1>ALERTSANYA <span style="font-weight: 300; font-size: 12px;">EXPERT</span></h1></div>
            <div class="tag">● LIVE ALPHA</div>
        </header>

        <div id="main-feed" style="margin-top: 25px;">
            <div style="text-align: center; color: #444; padding: 50px;">Balina istihbaratı bekleniyor...</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://apidenfvezstmpbbxser.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFwaWRlbmZ2ZXpzdG1wYmJ4c2VyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyMTQ0NjQsImV4cCI6MjA5Mjc5MDQ2NH0.MFebJX4cHNxMZCKss2y3YM4FJmegbGKyVP0R8M2qtNM';
        const { createClient } = supabase;
        const _supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        async function fetchFeed() {
            const { data } = await _supabase.from('transactions').select('*').order('created_at', { ascending: false }).limit(10);
            const list = document.getElementById('main-feed');
            if (data && data.length > 0) {
                list.innerHTML = '';
                data.forEach(tx => {
                    const tokenAddress = tx.wallet_address; // Artık veritabanında TOKEN ADRESİ var
                    list.innerHTML += `
                        <div class="feed-item">
                            <div class="whale-header">
                                <span class="whale-name">🐋 ${tx.whale_name}</span>
                                <span style="font-size: 10px; color: #555;">${new Date(tx.created_at).toLocaleTimeString()}</span>
                            </div>
                            <div class="action-box">
                                <span class="desc-txt">${tx.amount}</span>
                            </div>
                            <div class="btn-group">
                                <a href="https://dexscreener.com/solana/${tokenAddress}" target="_blank" class="action-btn btn-chart">📈 GRAFİĞİ AÇ</a>
                                <a href="https://rugcheck.xyz/tokens/${tokenAddress}" target="_blank" class="action-btn btn-security">🛡️ GÜVENLİK KONTROLÜ</a>
                            </div>
                        </div>
                    `;
                });
            }
        }

        _supabase.channel('tx').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'transactions' }, fetchFeed).subscribe();
        fetchFeed();
    </script>
</body>
</html>
